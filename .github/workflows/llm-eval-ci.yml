name: llm-eval CI

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=80
        env:
          EMBEDDING_BACKEND: local
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: llm-eval-unit

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: workforce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: workforce_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      EMBEDDING_BACKEND: local
    steps:
      - uses: actions/checkout@v4
      - name: Check out ingestion repo (shared base schema)
        uses: actions/checkout@v4
        with:
          repository: exclusivearj/workforce-intelligence-platform-ingestion
          path: _ingestion
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Apply schemas
        run: |
          psql -h localhost -U postgres -d workforce_test -f _ingestion/docker/init.sql
          psql -h localhost -U postgres -d workforce_test -f docker/init_llm_schema.sql
        env:
          PGPASSWORD: testpass
      - name: Integration tests
        run: pytest tests/integration/ -v -m integration
